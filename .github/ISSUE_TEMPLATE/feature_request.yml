name: 功能建议
description: 提一个你希望 Codex Mobile 补上的改进方向。
title: "[功能建议]："
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        这里默认用中文收集需求。如果你更习惯英文，也欢迎直接用英文填写。
  - type: textarea
    id: problem
    attributes:
      label: 问题或使用场景
      placeholder: 你现在缺什么流程，或者哪里用起来最别扭？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 希望的改动
      placeholder: 描述一下你想看到的功能或改进。
    validations:
      required: true
  - type: textarea
    id: workaround
    attributes:
      label: 当前替代方案
      placeholder: 你现在是怎么绕过去的？
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      placeholder: 可以放草图、截图，或者相关链接。
